server:
  port: 8080

spring:
  application:
    name: cims-backend
  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DB_URL:jdbc:mysql://localhost:3306/cims?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

cims:
  security:
    jwt-secret: ${JWT_SECRET:cims-secret-key}
    jwt-expire-seconds: ${JWT_EXPIRE_SECONDS:28800}
